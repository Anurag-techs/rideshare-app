# render.yaml — Render Infrastructure as Code
# Docs: https://render.com/docs/yaml-spec
# This file auto-configures your Render service on each deploy.

services:
  - type: web
    name: rideshare
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/payments/mode
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value
      - key: COMMISSION_RATE
        value: "0.12"
      # ── Razorpay Test Keys ────────────────────────────────────────────────────
      # Switch to rzp_live_ keys when going to production
      - key: RAZORPAY_KEY_ID
        value: rzp_test_SgEdksA054ZJ8q
      - key: RAZORPAY_KEY_SECRET
        value: E4mSFazKXY6jLjTeZKlp4Ynf
      # ── Google Maps ───────────────────────────────────────────────────────────
      - key: GOOGLE_MAPS_API_KEY
        value: AIzaSyCMRaYonQtxU_MRFhjUukfxfFn9P1n05Z4
      # ── OpenAI (optional — AI works in mock mode without this) ────────────────
      - key: OPENAI_API_KEY
        value: sk-YOUR_OPENAI_KEY     # Replace with real key to enable AI features
      # ── Database path on Render's ephemeral disk ──────────────────────────────
      # NOTE: Render's free tier has no persistent disk. Data resets on redeploy.
      # To persist data: add a Render Disk mounted at /data and set:
      #   value: /data/database.sqlite
      - key: DB_PATH
        value: ./database.sqlite
